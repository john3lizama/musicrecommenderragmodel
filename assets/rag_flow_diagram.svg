<svg viewBox="0 0 860 520" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', Consolas, monospace" role="img">
  <title>RAG Flow — Per-Song Sequence Diagram</title>
  <desc>Sequence diagram showing the RAG pipeline for a single song recommendation: build query, retrieve chunks, build prompt, call Ollama, quality check, return explanation or fallback.</desc>

  <!-- Background -->
  <rect width="860" height="520" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="430" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a2e" font-family="system-ui, sans-serif">RAG Pipeline — Per-Song Sequence</text>
  <text x="430" y="52" text-anchor="middle" font-size="11" fill="#6b7280" font-family="system-ui, sans-serif">What happens inside RAGExplainer.explain() for each of the top-k songs</text>

  <!-- ═══════ STEP BOXES (vertical sequence) ═══════ -->

  <!-- Step 1 -->
  <rect x="40" y="72" width="780" height="62" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="80" y="95" font-size="12" font-weight="700" fill="#4c1d95" font-family="system-ui, sans-serif">① Build Retrieval Query</text>
  <text x="80" y="113" font-size="11" fill="#5b21b6" font-family="system-ui, sans-serif">Combine user taste + song attributes into a single natural-language query string</text>
  <text x="80" y="128" font-size="10" fill="#6d28d9" font-family="system-ui, sans-serif">Example — user: lofi/chill · song: ambient/chill  →  query = "lofi chill ambient chill"</text>
  <rect x="680" y="80" width="120" height="46" rx="6" fill="#7c3aed"/>
  <text x="740" y="99" text-anchor="middle" font-size="10" font-weight="700" fill="#fff" font-family="system-ui, sans-serif">RAGExplainer</text>
  <text x="740" y="114" text-anchor="middle" font-size="10" fill="#ddd6fe" font-family="system-ui, sans-serif">_build_query()</text>

  <!-- Arrow down -->
  <line x1="430" y1="134" x2="430" y2="152" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="40" y="152" width="780" height="72" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="80" y="175" font-size="12" font-weight="700" fill="#4c1d95" font-family="system-ui, sans-serif">② Semantic Retrieval from Knowledge Base</text>
  <text x="80" y="193" font-size="11" fill="#5b21b6" font-family="system-ui, sans-serif">Embed the query with all-MiniLM-L6-v2 · compute cosine similarity against 33 pre-embedded chunks</text>
  <text x="80" y="209" font-size="10" fill="#6d28d9" font-family="system-ui, sans-serif">Return top-2 chunks ranked by similarity score  (embeddings loaded from cache after first run)</text>
  <text x="80" y="218" font-size="10" fill="#6d28d9" font-family="system-ui, sans-serif">Example — retrieves: "lofi-ambient crossover" chunk + "chill mood" chunk</text>
  <rect x="680" y="160" width="120" height="56" rx="6" fill="#7c3aed"/>
  <text x="740" y="180" text-anchor="middle" font-size="10" font-weight="700" fill="#fff" font-family="system-ui, sans-serif">KnowledgeBase</text>
  <text x="740" y="196" text-anchor="middle" font-size="10" fill="#ddd6fe" font-family="system-ui, sans-serif">retrieve(query,</text>
  <text x="740" y="210" text-anchor="middle" font-size="10" fill="#ddd6fe" font-family="system-ui, sans-serif">top_k=2)</text>

  <!-- Arrow down -->
  <line x1="430" y1="224" x2="430" y2="242" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="40" y="242" width="780" height="72" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="80" y="265" font-size="12" font-weight="700" fill="#4c1d95" font-family="system-ui, sans-serif">③ Build Grounded Prompt</text>
  <text x="80" y="283" font-size="11" fill="#5b21b6" font-family="system-ui, sans-serif">Inject retrieved chunks + user context + song info into a structured prompt template</text>
  <text x="80" y="299" font-size="10" fill="#6d28d9" font-family="system-ui, sans-serif">Prompt includes: system role · listener taste (genre+mood) · retrieved music knowledge · song title/artist/genre/mood</text>
  <text x="80" y="312" font-size="10" fill="#6d28d9" font-family="system-ui, sans-serif">Instruction: "In 1–3 sentences, why does this song fit their vibe?" — no numbers, no jargon</text>
  <rect x="680" y="250" width="120" height="56" rx="6" fill="#7c3aed"/>
  <text x="740" y="270" text-anchor="middle" font-size="10" font-weight="700" fill="#fff" font-family="system-ui, sans-serif">RAGExplainer</text>
  <text x="740" y="286" text-anchor="middle" font-size="10" fill="#ddd6fe" font-family="system-ui, sans-serif">_build_prompt()</text>
  <text x="740" y="300" text-anchor="middle" font-size="10" fill="#ddd6fe" font-family="system-ui, sans-serif">→ str</text>

  <!-- Arrow down -->
  <line x1="430" y1="314" x2="430" y2="332" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="40" y="332" width="780" height="62" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="80" y="355" font-size="12" font-weight="700" fill="#4c1d95" font-family="system-ui, sans-serif">④ Local LLM Generation via Ollama</text>
  <text x="80" y="373" font-size="11" fill="#5b21b6" font-family="system-ui, sans-serif">POST to localhost:11434/api/generate · model: llama3.2:3b · 30s timeout · stream: false</text>
  <text x="80" y="388" font-size="10" fill="#6d28d9" font-family="system-ui, sans-serif">Errors caught: ConnectionError · HTTP 404 · Timeout · JSONDecodeError — each logs a clear, actionable message · returns None on failure</text>
  <rect x="680" y="340" width="120" height="46" rx="6" fill="#7c3aed"/>
  <text x="740" y="360" text-anchor="middle" font-size="10" font-weight="700" fill="#fff" font-family="system-ui, sans-serif">OllamaClient</text>
  <text x="740" y="376" text-anchor="middle" font-size="10" fill="#ddd6fe" font-family="system-ui, sans-serif">generate(prompt)</text>

  <!-- Arrow down -->
  <line x1="430" y1="394" x2="430" y2="412" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 5 — two branches -->
  <!-- Quality check box -->
  <rect x="40" y="412" width="370" height="62" rx="8" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="225" y="434" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d" font-family="system-ui, sans-serif">⑤a Quality Check PASS</text>
  <text x="225" y="452" text-anchor="middle" font-size="10" fill="#166534" font-family="system-ui, sans-serif">10 ≤ len(response) ≤ 500 chars</text>
  <text x="225" y="467" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d" font-family="system-ui, sans-serif">→ return LLM explanation to main.py</text>

  <!-- Fallback box -->
  <rect x="450" y="412" width="370" height="62" rx="8" fill="#fecaca" stroke="#ef4444" stroke-width="1.5"/>
  <text x="635" y="434" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b" font-family="system-ui, sans-serif">⑤b Quality Check FAIL / None</text>
  <text x="635" y="452" text-anchor="middle" font-size="10" fill="#7f1d1d" font-family="system-ui, sans-serif">response too short, too long, or Ollama down</text>
  <text x="635" y="467" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b" font-family="system-ui, sans-serif">→ return fallback (score bullet points)</text>

  <!-- Divider line between branches -->
  <line x1="430" y1="412" x2="430" y2="474" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="430" y="406" text-anchor="middle" font-size="10" fill="#6b7280" font-family="system-ui, sans-serif">if ok</text>
  <text x="600" y="406" text-anchor="middle" font-size="10" fill="#6b7280" font-family="system-ui, sans-serif">if fail</text>

  <!-- ═══════ HUMAN REVIEW STRIP ═══════ -->
  <rect x="40" y="490" width="780" height="22" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="430" y="505" text-anchor="middle" font-size="10" font-weight="700" fill="#075985" font-family="system-ui, sans-serif">Human Reviews Output · pytest verifies retrieval ranking · quality guard · fallback behaviour (7 total tests)</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed"/>
    </marker>
  </defs>
</svg>
